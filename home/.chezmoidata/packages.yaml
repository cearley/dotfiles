packages:
  darwin:
    trusted:
    - 'buo/cask-upgrade'           # Tap for upgrading outdated Homebrew Casks with `brew cu` command
    - 'isen-ng/dotnet-sdk-versions' # Tap for managing multiple .NET SDK versions on macOS
    - 'itspriddle/brews/ical-guy'  # CLI for querying macOS calendar events, outputting JSON
    - 'localstack/tap'             # Homebrew tap for LocalStack, a fully functional local AWS cloud stack
    - 'manaflow-ai/cmux/cmux'      # Ghostty-based terminal with vertical tabs and notifications for AI coding agents
    - 'microsoft/mssql-release/msodbcsql18' # Microsoft ODBC Driver 18 for SQL Server
    - 'microsoft/mssql-release/mssql-tools18' # Microsoft SQL Server Command Line Tools (sqlcmd and bcp)
    - 'oven-sh/bun'                # Required for the oven-sh/bun/bun formula
    - 'postrv/narsil/narsil-mcp'   # MCP server for code analysis and security scanning
    - 'qltysh-archive/formulae/codeclimate' # Code quality analysis tool
    - 'supabase/tap/supabase'      # Supabase CLI

    taps:
    - 'isen-ng/dotnet-sdk-versions'
    - 'buo/cask-upgrade'

    # Core packages (always installed)
    core:
      taps:
      - 'oven-sh/bun'              # Required for the oven-sh/bun/bun formula
      brews:
      - 'aria2'                    # Download with resuming and segmented downloading
      - 'atuin'                    # Improved shell history for zsh, bash, fish and nushell
      - 'awscli'                   # Official Amazon AWS command-line interface
      - 'bat'                      # Clone of cat(1) with syntax highlighting and Git integration
      - 'chezmoi'                  # Manage your dotfiles across multiple diverse machines, securely
      - 'direnv'                   # Load/unload environment variables based on $PWD
      - 'fd'                       # Simple, fast and user-friendly alternative to find
      - 'fzf'                      # Command-line fuzzy finder written in Go
      - 'git'                      # Distributed revision control system
      - 'jq'                       # Lightweight and flexible command-line JSON processor
      - 'lsd'                      # Clone of ls with colorful output, file type icons, and more
      - 'mas'                      # Mac App Store command-line interface
      - 'neovim'                   # Ambitious Vim-fork focused on extensibility and agility
      - 'oven-sh/bun/bun'          # Fast all-in-one JavaScript runtime, bundler, transpiler and package manager
      - 'pwgen'                    # Password generator
      - 'rclone'                   # Rsync for cloud storage
      - 'tree'                     # Display directories as trees (with optional color/HTML output)
      - 'yq'                       # YAML/JSON/XML processor - like jq but for YAML
      - 'zoxide'                   # Shell extension to navigate your filesystem faster
      casks:
      - 'appcleaner'               # Application uninstaller
      - 'dropbox'                  # Client for the Dropbox cloud storage service
      - 'font-hack-nerd-font'      # Hack Nerd Font (Hack) - [no description]
      - 'font-meslo-lg-nerd-font'  # MesloLG Nerd Font families (Meslo LG) - [no description]
      - 'fuse-t'                   # Kext-less implementation of FUSE
      - 'google-drive'             # Client for the Google Drive storage service
      - 'grandperspective'         # Graphically shows disk usage within a file system
      - 'iterm2'                   # Terminal emulator as alternative to Apple's Terminal app
      - 'keepassxc'                # Password manager app
      - 'lulu'                     # Open-source firewall to block unknown outgoing connections
      - 'zoom'                     # Video communication and virtual meeting platform
      mas:
      - '"The Unarchiver", id: 425424353'

    # Packages that are very specific to my personal setup (personal tag)
    personal:
      taps:
      brews:
      - 'syncthing'
      casks:
      - 'chronoagent'
      - 'chronosync'
      - 'cryptomator'
      - 'discord'
      - 'etrecheckpro'
      - 'grammarly-desktop'
      - 'jump-desktop-connect'
      - 'logi-options+'
      - 'onyx'
      - 'powerphotos'               # Mac app for managing duplicate photos across libraries
      - 'slack'
      - 'utm'                       # Virtual machine app for running other operating systems on Apple Silicon Macs
      mas:
      - '"ASUS Device Discovery", id: 995124504'
      - '"ASUS Firmware Restoration", id: 1020519014'
      - '"Grammarly for Safari", id: 1462114288'
      - '"Kindle", id: 302584613'
      - '"Tabby - Classic", id: 6746771292'

    # Optional development packages (dev tag)
    dev:
      taps:
      - 'localstack/tap'
      - 'qltysh-archive/formulae'
      brews:
      - 'ack'
      - 'act'
      - 'aws-cdk'                   # AWS Cloud Development Kit for defining cloud infrastructure in code
      - 'aws-sam-cli'
      - 'azure-cli'
      - 'bats-core'
      - 'cfn-lint'
      - 'checkmake'
      - 'dagger'
      - 'frum'
      - 'gh'
      - 'git-delta'
      - 'git-gui'
      - 'github-markdown-toc'
      - 'go'
      - 'golangci-lint'
      - 'gopls'
      - 'graphviz'
      - 'http-server'
      - 'hugo'
      - 'localstack/tap/localstack-cli'
      - 'lynis'
      - 'nuget'
      - 'pipx'
      - 'pkgconf'
      - 'qltysh-archive/formulae/codeclimate'  # Code quality analysis tool
      - 'shellcheck'                # Static analysis tool for shell scripts
      - 'snyk-cli'
      - 'sqlite'
      casks:
      - 'db-browser-for-sqlite'
      - 'docker-desktop'
      - 'dotnet-sdk10-0-200'
      - 'dotnet-sdk10'
      - 'google-chrome'
      - 'gitbutler'
      - 'jetbrains-toolbox'
      - 'miniforge'
      - 'nosql-workbench'
      - 'visual-studio-code'
      mas:
      - '"JWT Inspector", id: 1559670160'
      sdkman: # Note that sdkman is installed only if the dev tag is present
      - "java 25-tem"
      - "java 8.0.462-zulu"
      - "liquibase"
      cargo: # Rust crates via cargo install (requires dev tag for Rust toolchain)
      - 'cargo-update'              # cargo install-update command for updating installed crates
      bun: # npm-compatible packages installed globally via bun
      - 'aws-cdk-local'             # cdklocal: wraps aws-cdk CLI to target LocalStack
      - 'azure-functions-core-tools@4'  # func: Azure Functions CLI (Homebrew tap disabled by GitHub)
      uv: # Python tools installed via uv tool install
      - 'aws-sam-cli-local'         # samlocal: wraps aws-sam-cli to target LocalStack

    # Optional AI packages (ai tag)
    ai:
      taps:
      - 'manaflow-ai/cmux'
      - 'postrv/narsil'
      - 'specstoryai/tap'
      - 'supabase/tap'
      brews:
      - 'beads'                      # Memory upgrade for your coding agent
      - 'block-goose-cli'            # Open source, extensible AI agent that goes beyond code suggestions
      - 'github-mcp-server'          # GitHub Model Context Protocol server for AI tools
      - 'itspriddle/brews/ical-guy'  # CLI for querying macOS calendar events, outputting JSON
      - 'postrv/narsil/narsil-mcp'   # MCP server for code analysis and security scanning
      - 'qwen-code'                  # AI-powered command-line workflow tool for developers
      - 'specstoryai/tap/specstory'  # Claude Code wrapper that saves conversation history to markdown
      - 'supabase/tap/supabase'      # Supabase CLI
      bun:
      - '@fission-ai/openspec@latest'  # AI-native system for spec-driven development
      - 'ralph-tui'                    # AI agent loop orchestrator TUI
      casks:
      - 'block-goose'                # Open source, extensible AI agent that goes beyond code suggestions
      - 'claude'                     # Anthropic's official Claude AI desktop app
      - 'manaflow-ai/cmux/cmux'      # Ghostty-based terminal with vertical tabs and notifications for AI coding agents
      - 'codex'                      # OpenAI's coding agent that runs in your terminal
      - 'codex-app'                  # OpenAI's Codex desktop app for managing coding agents
      #- 'copilot-cli'
      - 'copilot-cli@prerelease'     # Brings the power of Copilot coding agent directly to your terminal
      - 'google-gemini'              # Google's Gemini AI desktop app
      - 'jan'                        # Offline AI chat tool
      - 'lm-studio'                  # Discover, download, and run local LLMs
      - 'ollama-app'                 # Get up and running with large language models locally
      uv:
      - "basic-memory"
      - "claude-monitor"
      - "sniffly@latest"
      - "git+https://github.com/cearley/claude-extend@latest"
      - 'git+https://github.com/cearley/claude-session-index'
      - "git+https://github.com/cearley/zsh-llm-suggestions"
      - "-p 3.13 serena-agent@latest --prerelease=allow"
      cargo:
      #- '--git https://github.com/Dicklesworthstone/beads_rust.git beads_rust'  # Removed: requires nightly Rust (fsqlite-pager E0554); brew beads is sufficient
      agents:
        claude_code:
          mcp_servers: # Registered via `claude mcp add --scope user <name> -- <command...>`
          - 'basic-memory -s user -- uvx --python 3.12 basic-memory mcp'
          - 'fast-filesystem -e CREATE_BACKUP_FILES="true" -- npx -y fast-filesystem-mcp'
          - 'localstack-mcp-server -- mcp-env-wrapper localstack-mcp-server npx -y @localstack/localstack-mcp-server'
          - 'playwright npx @playwright/mcp@latest'
          - 'safari -- npx safari-mcp'
          skills: # Installed via `npx skills add <args> -g`
          - 'basicmachines-co/basic-memory-skills --skill memory-notes --skill memory-defrag'
          - 'cearley/claude-session-index --skill session-index'
          - 'specstoryai/agent-skills -all'
          # Install specific skills with arguments
          #- 'specstoryai/agent-skills --skill specstory-yak specstory-session-summary'
          # Wondel Skills https://skills.wondel.ai
          - wondelai/skills/clean-code
          - wondelai/skills/refactoring-patterns
          - wondelai/skills/software-design-philosophy
          - wondelai/skills/pragmatic-programmer
          - wondelai/skills/domain-driven-design
          - wondelai/skills/ddia-systems
          - wondelai/skills/system-design
          - wondelai/skills/clean-architecture
          plugin_marketplaces: # Registered via `claude plugins marketplace add`
          - 'anthropics/claude-plugins-official'
          - 'anthropics/skills'
          - 'aws/agent-toolkit-for-aws'
          - 'https://dev.azure.com/Willdan-WLE/ViewPointV2/_git/WES.ViewPoint.Utilities.Docs#dev'
          - 'microsoftdocs/mcp'        # Microsoft Docs MCP marketplace
          plugins: # Installed via `claude plugins install`
          # - 'atlassian@claude-plugins-official' # Project/local-only plugin
          # - 'aws-core@agent-toolkit-for-aws' # Project/local-only plugin
          - 'claude-code-setup@claude-plugins-official'
          - 'claude-md-management@claude-plugins-official'
          - 'example-skills@anthropic-agent-skills'
          # - 'fulcrum-skills@viewpoint-tools' # Project/local-only plugin        
          - 'ralph-loop@claude-plugins-official'
          - 'superpowers@claude-plugins-official'
        # codex:
        #   mcp_servers: []
        #   skills: []
        # gemini:
        #   mcp_servers: []
        #   skills: []
        #   extensions: []

    # Optional data science packages (datascience tag)
    datascience:
      taps:
      brews:
      - 'csvkit'
      - 'pandoc'
      - 'pdfly'
      casks:
      - 'basictex'
      - 'cursor'
      - 'r-app'
      - 'rstudio'

    # Optional work packages (work tag)
    work:
      taps:
      - 'microsoft/mssql-release'
      brews:
      - 'microsoft/mssql-release/msodbcsql18'
      - 'microsoft/mssql-release/mssql-tools18'
      - 'vips'
      casks:
      - 'amazon-workspaces'
      - 'box-drive'
      - 'dotnet-sdk3-1-400'
      - 'dotnet-sdk6-0-400'
      - 'dotnet-sdk6'
      - 'dotnet-sdk8-0-400'
      - 'dotnet-sdk8'
      - 'microsoft-auto-update'
      - 'microsoft-teams'
      - 'obsidian'
      - 'postman'                  # API testing and development platform
      - 'webex'
      - 'whimsical'
      - 'windows-app'
      mas:
      - '"Microsoft Excel", id: 462058435'
      - '"Microsoft Outlook", id: 985367838'
      - '"Microsoft Word", id: 462054704'
      - '"Numbers", id: 361304891'
      - '"OneDrive", id: 823766827'

    # Optional mobile packages (mobile tag)
    mobile:
      taps:
      brews:
      casks:
      - 'tunnelblick'
      - 'wifi-explorer-pro'
      mas:
      - '"WireGuard", id: 1451685025'
