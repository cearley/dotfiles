      label: Default Folder
      path: ~/Sync
      versioning:
        type: none
      ignores:
        - "(?d).DS_Store"
    - id: emmxp-fxjwr
      label: knowledge-personal
      path: ~/basic-memory
      versioning:
        type: simple
        params:
          cleanoutDays: "0"
          keep: "5"
      ignores:
