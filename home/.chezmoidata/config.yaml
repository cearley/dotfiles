# Machine-specific configuration
# Maps machine name patterns to their corresponding machine settings
#
# The machine name is obtained from the `machine-name` template, which returns:
#   - macOS:   Output of `scutil --get "ComputerName"`
#   - Linux:   Static hostname from hostnamectl
#   - Windows: System hostname from DNS
#
# Patterns are matched using substring matching (contains), so:
#   "MacBook Pro" matches "MacBook Pro", "HAL 9000's MacBook Pro", "Work MacBook Pro", etc.
#   "Mac mini" matches "Mac mini", "NotTheITDept Mac mini", "Office Mac mini", etc.
#
# If no pattern matches, templates return empty strings and scripts will skip
# machine-specific operations gracefully.
#
# Explanation of machine-specific properties:
#
# brewfile          - Specifies the Homebrew Brewfile to use for that machine.
#                     These are located in the brewfiles/ directory within the
#                     chezmoi source directory and the machine's brewfile is
#                     symlinked to $HOME/Brewfile during setup.
#
# keepassxc_entries - Machine-specific KeePassXC entry mappings.
#                     Maps logical names (e.g., "ssh") to actual KeePassXC
#                     entry names. (This is useful when different machines
#                     share the same keepassxc database but have different
#                     entries for the same purpose.)
#
# claude_envs       - List of Claude environment directory paths for this machine.
#                     Each entry MUST match the pattern ~/.claude-<name> (e.g., "~/.claude-work").
#                     Non-conforming entries cause chezmoi apply/diff/cat to fail at template-render
#                     time with a precise error message naming the offending entry.
#
# claude_default    - Which claude-* environment the shell should export CLAUDE_CONFIG_DIR to by
#                     default on this machine (e.g., "claude-work", "claude-personal").
#                     MUST equal "claude-<name>" for some <name> derived from claude_envs.
#                     A mismatch causes chezmoi apply/diff/cat to fail at template-render time.
#                     If omitted, no default export is created and `claude` uses whatever
#                     CLAUDE_CONFIG_DIR is already set in the shell.
#
MacBook Pro:
  brewfile: mbp-brewfile
  claude_default: claude-work
  claude_envs:
    - '~/.claude-bedrock'
    - '~/.claude-personal'
    - '~/.claude-work'
  keepassxc_entries:
    ssh: SSH (MacBook Pro)
Mac Studio:
  brewfile: studio-brewfile
  claude_default: claude-personal
  claude_envs:
    - '~/.claude-personal'
    - '~/.claude-work'
  keepassxc_entries:
    ssh: SSH (Mac Studio)
Mac mini:
  brewfile: mac-mini-brewfile
  keepassxc_entries:
    ssh: SSH (Mac mini)