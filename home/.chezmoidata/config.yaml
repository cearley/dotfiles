# Machine-specific configuration
# Maps machine name patterns to their corresponding machine settings
#
# The machine name is obtained from the `machine-name` template, which returns:
#   - macOS:   Output of `scutil --get "ComputerName"`
#   - Linux:   Static hostname from hostnamectl
#   - Windows: System hostname from DNS
#
# Patterns are matched using substring matching (contains), so:
#   "MacBook Pro" matches "MacBook Pro", "HAL 9000's MacBook Pro", "Work MacBook Pro", etc.
#   "Mac mini" matches "Mac mini", "NotTheITDept Mac mini", "Office Mac mini", etc.
#
# If no pattern matches, templates return empty strings and scripts will skip
# machine-specific operations gracefully.
#
# Explanation of machine-specific properties:
#
# brewfile          - Specifies the Homebrew Brewfile to use for that machine.
#                     These are located in the brewfiles/ directory within the
#                     chezmoi source directory and the machine's brewfile is
#                     symlinked to $HOME/Brewfile during setup.
#
# keepassxc_entries - Machine-specific KeePassXC entry mappings.
#                     Maps logical names (e.g., "ssh") to actual KeePassXC
#                     entry names. (This is useful when different machines
#                     share the same keepassxc database but have different
#                     entries for the same purpose.)
#
# claude_envs       - List of Claude environment directory paths for this machine.
#                     Each entry MUST match the pattern ~/.claude-<name> (e.g., "~/.claude-work").
#                     Non-conforming entries cause chezmoi apply/diff/cat to fail at template-render
#                     time with a precise error message naming the offending entry.
#
# claude_default    - Which claude-* environment the shell should export CLAUDE_CONFIG_DIR to by
#                     default on this machine (e.g., "claude-work", "claude-personal").
#                     MUST equal "claude-<name>" for some <name> derived from claude_envs.
#                     A mismatch causes chezmoi apply/diff/cat to fail at template-render time.
#                     If omitted, no default export is created and `claude` uses whatever
#                     CLAUDE_CONFIG_DIR is already set in the shell.
#
# claude_env_colors - Optional p10k color overrides for the claude_env prompt segment.
#                     Maps environment names to p10k color numbers. Omitted envs use color 244 (grey).
#                     Built-in defaults: work=33 (blue), personal=76 (green), bedrock=208 (orange).
#                     Example:
#                       claude_env_colors:
#                         work: 33
#                         personal: 76
#                         bedrock: 208
#                         client: 155
#
# syncthing_folders - List of Syncthing shared folders to configure on this machine.
#                     The setup script (position 94) adds missing folders and reconciles
#                     versioning and ignore patterns on every `chezmoi apply`.
#                     Device sharing is managed separately via the Syncthing Web UI.
#
#                     Each entry supports:
#                       id       - Syncthing folder ID (must match across machines for the same shared folder)
#                       label    - Human-readable folder name
#                       path     - Local path (tilde-expanded at script runtime)
#                       versioning (optional):
#                         type   - Versioning strategy: simple | trashcan | staggered | external | none
#                                  Use "none" to explicitly clear versioning. Omit the entire
#                                  versioning key to leave existing versioning unchanged.
#                         params - Map of versioning parameters (all values must be strings).
#                                  Keys are Syncthing-native camelCase (e.g., keep, cleanoutDays).
#                       ignores (optional):
#                         List of Syncthing ignore patterns. Replaces the folder's .stignore on
#                         each apply. Omit to leave the existing .stignore unchanged.
#
MacBook Pro:
  brewfile: mbp-brewfile
  claude_default: claude-work
  claude_envs:
    - '~/.claude-bedrock'
    - '~/.claude-personal'
    - '~/.claude-work'
  keepassxc_entries:
    ssh: SSH (MacBook Pro)
  syncthing_folders:
    - id: default
      label: Default Folder
      path: ~/Sync
      versioning:
        type: none
      ignores:
        - "(?d).DS_Store"
    - id: emmxp-fxjwr
      label: knowledge-personal
      path: ~/basic-memory
      versioning:
        type: simple
        params:
          cleanoutDays: "0"
          keep: "5"
      ignores:
        - "(?d).DS_Store"
    - id: gprnu-lxo9w
      label: Confidential
      path: ~/Confidential
      versioning:
        type: none
      ignores:
        - "(?d).DS_Store"
    - id: onhkl-pan5k
      label: Business
      path: ~/Business
      versioning:
        type: simple
        params:
          cleanoutDays: "0"
          keep: "5"
      ignores:
        - "(?d).DS_Store"
    - id: uqowz-v2f3n
      label: knowledge-work
      path: ~/.local/share/basic-memory
      versioning:
        type: simple
        params:
          cleanoutDays: "0"
          keep: "5"
      ignores:
        - "(?d).DS_Store"
Mac Studio:
  brewfile: studio-brewfile
  claude_default: claude-personal
  claude_envs:
    - '~/.claude-personal'
    - '~/.claude-work'
  keepassxc_entries:
    ssh: SSH (Mac Studio)
  syncthing_folders:
